<!DOCTYPE html>
<html>
<head>
    <title>ClaudeArchive Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>ClaudeArchive Explorer</h1>
    <input type="text" id="filterInput" class="form-control my-4" placeholder="Filtra per titolo o data...">
    
    <table class="table table-hover">
        <thead>
            <tr>
                <th>Data</th>
                <th>Titolo</th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody id="chatTable">
            {% for chat in chats %}
            <tr>
                <td>{{ chat.date }}</td>
                <td>{{ chat.title }}</td>
                <td><a href="/chat/{{ chat.filename }}" class="btn btn-sm btn-primary">Apri</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        document.getElementById('filterInput').addEventListener('keyup', function() {
            let val = this.value.toLowerCase();
            document.querySelectorAll('#chatTable tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
