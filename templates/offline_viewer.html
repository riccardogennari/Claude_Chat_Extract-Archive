<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Visualizzatore Chat Offline | ClaudeArchive Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <style>
        pre code { border-radius: 5px; }
        .chat-container { max-width: 900px; margin: auto; }
        .view-section { display: none; background: white; border-radius: 8px; }
        .active-section { display: block; }
        #renderedContent img { max-width: 100%; }
        hr { margin: 2rem 0; opacity: 0.15; }
        .export-meta-info { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #0d6efd; }
        #sourceContent pre { white-space: pre-wrap; background: #f8f9fa; color: #333; padding: 20px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Torna all'indice offline</a>
            <div class="btn-group">
                <button onclick="showSection('rendered')" id="btn-rendered" class="btn btn-primary">Anteprima HTML</button>
                <button onclick="showSection('source')" id="btn-source" class="btn btn-outline-light">Sorgente Markdown</button>
            </div>
        </div>
    </nav>

    <div class="container chat-container">
        <div class="export-meta-info">
            <p class="mb-1"><strong>Esportazione:</strong> {{ export_metadata.export_title }}</p>
            <p class="mb-1"><strong>Data Esportazione:</strong> {{ export_metadata.export_date }}</p>
            <p class="mb-0"><a href="{{ filename }}" class="btn btn-sm btn-info mt-2" download>Scarica file MD originale</a></p>
        </div>

        <div id="renderedContent" class="view-section active-section card p-5 shadow-sm mb-5"></div>

        <div id="sourceContent" class="view-section card p-5 shadow-sm mb-5">
            <h4 class="text-muted mb-4">Sorgente Markdown ({{ filename }})</h4>
            <pre><code id="raw-markdown">{{ raw }}</code></pre>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <script>
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        const rawText = document.getElementById('raw-markdown').textContent;
        document.getElementById('renderedContent').innerHTML = marked.parse(rawText);
        hljs.highlightAll();

        function showSection(type) {
            const rendered = document.getElementById('renderedContent');
            const source = document.getElementById('sourceContent');
            const btnR = document.getElementById('btn-rendered');
            const btnS = document.getElementById('btn-source');

            if (type === 'rendered') {
                rendered.classList.add('active-section');
                source.classList.remove('active-section');
                btnR.className = "btn btn-primary";
                btnS.className = "btn btn-outline-light";
            } else {
                rendered.classList.remove('active-section');
                source.classList.add('active-section');
                btnR.className = "btn btn-outline-light";
                btnS.className = "btn btn-primary";
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
