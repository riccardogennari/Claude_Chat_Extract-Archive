<!DOCTYPE html>
<html>
<head>
    <title>Visualizzatore Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .source-view { display: none; background: #f8f9fa; padding: 20px; border-radius: 5px; }
        pre { white-space: pre-wrap; }
    </style>
</head>
<body class="container mt-5">
    <div class="mb-4">
        <a href="/" class="btn btn-secondary">← Torna alla lista</a>
        <button onclick="toggleView()" class="btn btn-info" id="toggleBtn">Vedi Sorgente MD</button>
    </div>

    <div id="renderedContent" class="card p-4 shadow-sm">
        {{ content|safe }}
    </div>

    <div id="sourceContent" class="source-view">
        <h3>Sorgente Markdown</h3>
        <pre>{{ raw }}</pre>
    </div>

    <script>
        function toggleView() {
            let rendered = document.getElementById('renderedContent');
            let source = document.getElementById('sourceContent');
            let btn = document.getElementById('toggleBtn');
            
            if (rendered.style.display === 'none') {
                rendered.style.display = 'block';
                source.style.display = 'none';
                btn.innerText = "Vedi Sorgente MD";
            } else {
                rendered.style.display = 'none';
                source.style.display = 'block';
                btn.innerText = "Vedi Render HTML";
            }
        }
    </script>
</body>
</html>
